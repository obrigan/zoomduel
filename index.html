<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoZoom Duel: World Edition</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <div id="setup-overlay">
        <h1>GeoZoom Duel</h1>
        <p id="setup-role-text" style="color: #aaa; margin-bottom: 20px;">Подключение...</p>
        
        <input type="text" id="nick-input" placeholder="Твой никнейм" maxlength="12" autocomplete="off">
        
        <div id="host-panel" style="display: block;">
            <div class="url-box" id="game-url-box">Генерация ссылки...</div>
            <button id="btn-copy" class="menu-btn">СКОПИРОВАТЬ ССЫЛКУ</button>
            <div id="lobby-status">ЗАГРУЗКА ГРАНИЦ...</div>
            <button id="btn-start" class="menu-btn secondary-btn" disabled>НАЧАТЬ ИГРУ</button>
        </div>

        <div id="guest-panel" style="display: block;">
            <button id="btn-join" class="menu-btn">ПРИСОЕДИНИТЬСЯ</button>
        </div>
    </div>

    <div id="main-game-container" style="display: none;">
        <div id="game-info">
            <span id="name-p1" class="player-name">Игрок 1</span> 
            <div class="score-center">
                <span id="score-p1" class="score-val">0</span>
                <span class="score-divider">:</span>
                <span id="score-p2" class="score-val">0</span>
            </div>
            <span id="name-p2" class="player-name">Игрок 2</span>
        </div>

        <h2 id="status-text">Ожидание...</h2>

        <div id="map-wrapper">
            <div id="map"></div>
            <div id="map-overlay" style="display: none;">
                <h1 id="overlay-text">ОТВЕЧАЕТ ИГРОК!</h1>
            </div>
        </div>

        <div id="player-controls" style="display: none;">
            <button id="btn-buzz" onclick="sendBuzz()">ОТВЕТИТЬ!</button>
        </div>

        <div id="host-controls" style="display: none;">
            <p style="color: #2ecc71; font-size: 26px; font-weight: bold; margin-bottom: 5px;">Ответ: <span id="correct-answer-host" style="text-transform: uppercase;">...</span></p>
            <p style="margin-bottom: 15px;">Игрок <span id="answering-player-name" style="color:#f1c40f; font-weight: bold;">...</span> дает ответ.</p>
            <div style="display: flex; gap: 20px;">
                <button class="judge-btn correct-btn" onclick="judgeAnswer(true)">ВЕРНО (+100)</button>
                <button class="judge-btn wrong-btn" onclick="judgeAnswer(false)">НЕВЕРНО (-100)</button>
            </div>
            <button class="judge-btn skip-btn" onclick="skipRound()" style="margin-top: 15px;">СКИП</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
